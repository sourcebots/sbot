name: Lint & build

on:
  push:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        py_version: ["3.9", "3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            py_version: "3.9"
          - os: windows-latest
            py_version: "3.12"  # WinSDK doesn't support 3.13, need to update april-vision
          - os: macos-latest
            py_version: "3.9"
          - os: macos-latest
            py_version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.py_version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev,vision]
    - name: Lint
      run: |
        poe lint
    - name: Typecheck
      run: |
        poe type
    - name: Run tests
      run: |
        poe test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip build poethepoet
        # Install package to generate version info
        python -m pip install .
    - name: Build package
      run: |
        poe build
    - name: Save built package
      uses: actions/upload-artifact@v6
      with:
        name: package
        path: |
          dist

  upload:
    name: Publish to PyPi
    needs: build
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    runs-on: ubuntu-latest
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v6
      with:
        name: package
        path: dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

